        .ai-btn:active {

        /* Pulse ring animation */
        .ai-pulse {

            inset: -4px;
            border-radius: 50px;
            border: 2px solid rgba(0, 166, 81, 0.4);
            animation: ai-ring 2s ease-out infinite;
        }
        .ai-pulse-2 {
            animation-delay: 1s;
        }
        @keyframes ai-ring {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.15); opacity: 0; }

        /* Glow dot */
        .ai-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4ADE80;
            box-shadow: 0 0 8px #4ADE80, 0 0 16px rgba(74, 222, 128, 0.4);
            animation: ai-glow 1.5s ease-in-out infinite alternate;

        @keyframes ai-glow {

            100% { box-shadow: 0 0 12px #4ADE80, 0 0 24px rgba(74, 222, 128, 0.6); }
        }

        /* Close button when widget is active */
        .ai-close {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
            width: 44px;
            height: 44px;
            border-radius: 50%;

            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(70, 45, 140, 0.3);
            transition: all 0.2s;
        }
        .ai-close:hover {

            transform: scale(1.1);
        }
        .ai-close.visible {
            display: flex;

    <script>
        function openAI() {
            const widget = document.querySelector('elevenlabs-convai');
            widget.classList.add('el-active');
            document.getElementById('aiBtnWrapper').style.display = 'none';
            document.getElementById('aiClose').classList.add('visible');
            // Try to auto-click the start call button inside the widget
            setTimeout(() => {
                try {
                    const sr = widget.shadowRoot;
                    if (sr) {
                        const btn = sr.querySelector('button');
                        if (btn) btn.click();
                    }
                } catch(e) {}
            }, 600);
        }

        function closeAI() {
            const widget = document.querySelector('elevenlabs-convai');
            // End the active conversation by clicking the widget's internal button
            try {
                const sr = widget.shadowRoot;
                if (sr) {
                    const btn = sr.querySelector('button');
                    if (btn) btn.click();
                }
            } catch(e) {}
            // Hide widget and reset UI
            setTimeout(() => {
                widget.classList.remove('el-active');
                document.getElementById('aiBtnWrapper').style.display = '';
                document.getElementById('aiClose').classList.remove('visible');
            }, 300);
        }
    </script>
